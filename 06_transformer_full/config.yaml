# Configuration for Transformer training
src_vocab_size: 37000  # As in paper for EN-DE (train.py demo only)
tgt_vocab_size: 37000
d_model: 512
num_layers: 6
num_heads: 8
d_ff: 2048
max_len: 5000
dropout: 0.1

# train_translation.py (full run: ~907 batches/epoch on CPU → many hours)
batch_size: 32
epochs: 10
learning_rate: 0.0001
output_dir: ../output
viz_sample_indices: [0, 100, 500]
viz_every_n_epochs: 1
log_every_n_batches: 50
max_batches: 100 
